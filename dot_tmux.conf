# https://news.ycombinator.com/item?id=47752819
# https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/
# https://claude.ai/share/e8316ddd-7151-4705-b190-aec3b3ec3774

# Prefix: C-a is easier than C-b on mobile
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Intuitive splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Mouse on - essential for Termux (tap to switch panes/windows)
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# No bells
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# Statusbar
set -g status-position bottom
set -g status-right '%Y-%m-%d %H:%M'
set -g status-right-length 20

# Slow down mouse scroll
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down


